<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0" />
    <title></title>
    <script data-main="main" type="text/javascript" src="require.js"></script>
    <style>
        * {
            padding: 0px;
            margin: 0px;
            border: 0px;
        }

        html {
            height: 100%;
            overflow-y: scroll;
        }

        body {
            height: 100%;
        }

        #canvas {
            display: block;
            height: 100%;
            width: 100%;
            position: relative;
        }

        #debug {
            position: absolute;
            top: 10px;
            left: 10px;
            min-width: 200px;
            background: #ddd;
            padding: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: #eeeeee;
            font-family: monospace;
            font-weight: 600;
            border-radius: 4px;
            font-size: 32px;

            div {
                display: flex;
                gap: 16px;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="debug">
    <div>
        Max. FPS <span id="maxFps"></span>
    </div>
    <div>
        FPS <span id="fps"></span>
    </div>
    <div>
        Objects on scene <span id="objects"></span>
    </div>
    <div>
        Objects on screen <span id="visibleObjects"></span>
    </div>
    <div>
        Faces <span id="facesCount"></span>
    </div>
    <div>
        Draw Calls <span id="drawCalls"></span>
    </div>
    <button id="debug-btn">DEBUG</button>
    <button id="debug-wireframe-btn">WIREFRAME</button>
</div>
</body>
</html>
