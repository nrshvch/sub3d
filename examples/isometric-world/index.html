<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title></title>
    <script type="module" src="main.js"></script>
    <style>
      * {
        padding: 0px;
        margin: 0px;
        border: 0px;

        touch-action: none;
        -webkit-user-select: none; /* Prevents text selection while panning */
        user-select: none;
      }

      html {
        height: 100%;
        overflow-y: scroll;
      }

      body {
        height: 100%;
      }

      #canvas {
        display: block;
        height: 100%;
        width: 100%;
        position: relative;
      }

      #debug {
        position: absolute;
        top: 10px;
        left: 10px;
        min-width: 200px;
        background: #ddd;
        padding: 8px;
        background: rgba(0, 0, 0, 0.7);
        color: #eeeeee;
        font-family: monospace;
        font-weight: 600;
        border-radius: 4px;
        font-size: 32px;

        @media (max-width: 768px) {
          font-size: 12px;
        }

        div {
          display: flex;
          gap: 16px;
          justify-content: space-between;
        }
      }

      .actions {
        margin-top: 8px;

        button {
          padding: 4px 8px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="debug">
      <div>Max. FPS <span id="maxFps"></span></div>
      <div>FPS <span id="fps"></span></div>
      <div>Objects on scene <span id="objects"></span></div>
      <div>Objects on screen <span id="visibleObjects"></span></div>
      <div>Faces <span id="facesCount"></span></div>
      <div>Draw Calls <span id="drawCalls"></span></div>
      <div>DPR <span id="dpr"></span></div>
      <div class="actions">
        <button id="debug-wireframe-btn">WIREFRAME</button>
      </div>
    </div>
  </body>
</html>
